apiVersion: 1

datasources:
  - name: BetfairLTD
    uid: betfair-ltd-postgres
    type: postgres
    # 'postgres' resolves to the Docker Compose service name
    url: postgres:5432
    database: ${POSTGRES_DB}
    user: ${POSTGRES_USER}
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      sslmode: disable
      postgresVersion: 1500
      timescaledb: false
    isDefault: true
    editable: true
