# Betfair LTD Bot — Docker Compose
#
# USAGE
#   Local dev  (DB only — run the bot via Python directly):
#     docker compose up -d
#
#   Full local Docker  (everything in containers):
#     docker compose --profile bot up -d
#
#   Stop:   docker compose down
#   Wipe:   docker compose down -v   (destroys all data!)

services:

  postgres:
    image: postgres:15-alpine
    container_name: betfair_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-betfair_ltd}
      POSTGRES_USER: ${POSTGRES_USER:-bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bot_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-bot} -d ${POSTGRES_DB:-betfair_ltd}
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:11.6.0
    container_name: betfair_grafana
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-clock-panel
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana

  # Only started with: docker compose --profile bot up -d
  bot:
    profiles: ["bot"]
    build: .
    container_name: betfair_bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      # Override DB host to Docker's internal service name (not localhost)
      DATABASE_URL: "postgresql+psycopg2://${POSTGRES_USER:-bot}:${POSTGRES_PASSWORD:-bot_password}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-betfair_ltd}"
      DATABASE_URL_SYNC: "postgresql+psycopg2://${POSTGRES_USER:-bot}:${POSTGRES_PASSWORD:-bot_password}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-betfair_ltd}"
      # Certs from ./certs/ on the host are mounted at /certs inside the container
      BETFAIR_CERT_PATH: /certs/betfair.crt
      BETFAIR_CERT_KEY_PATH: /certs/betfair.key
    volumes:
      - ./certs:/certs:ro

volumes:
  postgres_data:
  grafana_data:
