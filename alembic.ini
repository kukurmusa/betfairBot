# Alembic configuration for Betfair LTD Bot
# The real database URL is set in env.py from the DATABASE_URL_SYNC env var.
# The hardcoded value below is only a fallback for offline mode — never used
# for live migrations (psycopg2 is required, not asyncpg).
[alembic]
script_location = src/db/migrations
prepend_sys_path = .
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
sqlalchemy.url = postgresql+psycopg2://bot:bot_password@localhost:5432/betfair_ltd

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
